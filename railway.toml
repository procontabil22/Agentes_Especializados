# railway.toml — FinTax Agents
# Docs: https://docs.railway.app/reference/config-as-code

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# startCommand removido intencionalmente:
# o CMD do Dockerfile já cuida do start com expansão correta de $PORT.
# Manter startCommand aqui E CMD no Dockerfile causava conflito no Railway.
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
healthcheckPath = "/health"
healthcheckTimeout = 30
